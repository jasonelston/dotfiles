# =============================================================================
# Personal tmux configuration (canonical entry point)
#
# This file IS the main tmux config — `~/.tmux.conf` symlinks here.
# It fully replaces thoughtbot/dotfiles' tmux.conf so the public repo stays
# untouched. rcm picks this file first because `dotfiles-local` is listed
# before `dotfiles` in rcrc's DOTFILES_DIRS.
# =============================================================================

# --- Reload binding -----------------------------------------------------------
unbind r
bind r source-file ~/.tmux.conf

# --- Terminal capabilities ----------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-features "*:hyperlinks"   # OSC 8 hyperlinks (clickable URLs)

# --- Core behavior ------------------------------------------------------------
setw -g mode-keys vi
set -g mouse on
set -g history-limit 10000
set -g detach-on-destroy off               # stay attached when closing a session

# --- Window / pane numbering --------------------------------------------------
set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# --- Prefix -------------------------------------------------------------------
set -g prefix2 C-s
bind-key C-b send-prefix
bind-key C-s send-prefix -2
unbind-key C-z                             # don't suspend the client

# Pane navigation is delegated to christoomey/vim-tmux-navigator (binds plain
# Ctrl+h/j/k/l, works between tmux panes and vim splits). Explicit unbinds
# below are belt-and-suspenders — with this file as the entry point,
# thoughtbot's `bind-key h/j/k/l ...` lines are never sourced.
unbind-key h
unbind-key j
unbind-key k
unbind-key l
unbind-key C-h
unbind-key C-l

# --- Activity / bell flags ----------------------------------------------------
set-window-option -g monitor-activity on
set-window-option -g monitor-bell on
set-option -g visual-activity off
set-option -g visual-bell off

# --- Status bar layout --------------------------------------------------------
set-option -g status-position top
set -g status-interval 1                   # 1s for live Claude pane_title spinner
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# --- Plugins (TPM scans this file for @plugin declarations) -------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.3.0'    # pinned; bump tag to upgrade

# Plugin options
set -g @continuum-restore 'on'                 # auto-restore on tmux start
set -g @resurrect-capture-pane-contents 'on'   # save pane scrollback
set -g @resurrect-strategy-nvim 'session'      # restore nvim sessions

# --- Catppuccin theme (TPM-managed; loaded by `run tpm` at bottom of file) ----
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Directory module: home-relative path so it stays informative even when the
# dir basename matches the session name (common with sesh auto-naming).
set -g @catppuccin_directory_text " #{s|^/Users/jasonelston|~|:pane_current_path}"

# Status modules. #{E:...} is evaluated at status render time, not config-load
# time, so catppuccin's modules don't need to exist yet when these are set.
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# --- Sesh combined picker (prefix + K, Cmd + K) -------------------------------
bind-key "W" run-shell "sesh window $(sesh list -i | fzf-tmux -p 60%,50% --prompt '⚡ ')"
bind-key "K" display-popup -h 80% -w 80% -E "/Users/jasonelston/dotfiles-local/sesh-combined-picker"

# Cmd+K from Ghostty: tilde-terminated CSI (not `u`) so tmux's CSI-u parser
# doesn't swallow it. Ghostty sends \e[1;31337~ -> tmux User0 -> popup.
set -s user-keys[0] "\033[1;31337~"
bind-key -n User0 display-popup -h 80% -w 80% -E "/Users/jasonelston/dotfiles-local/sesh-combined-picker"

# --- Lazygit launcher (prefix + g, Cmd + G) -----------------------------------
bind-key g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% lazygit
set -s user-keys[1] "\033[1;31338~"
bind-key -n User1 display-popup -E -d "#{pane_current_path}" -w 90% -h 90% lazygit

# --- Misc ---------------------------------------------------------------------
bind-key x kill-pane                       # skip "kill-pane 1? (y/n)" prompt

# --- Initialize TPM (MUST be at the very bottom, after all @plugin lines) -----
run '~/.tmux/plugins/tpm/tpm'
